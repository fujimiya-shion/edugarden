---
- name: Provision app servers
  hosts: app_servers
  become: true
  roles:
    - docker

- name: Provision MySQL servers
  hosts: mysql_servers
  become: true
  roles:
    - mysql

- name: Provision Redis servers
  hosts: redis_servers
  become: true
  roles:
    - redis

- name: Provision load balancers
  hosts: lb_servers
  become: true
  roles:
    - nginx
