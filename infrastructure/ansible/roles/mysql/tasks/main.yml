---
- name: Ensure Debian-based OS
  ansible.builtin.assert:
    that:
      - ansible_facts["os_family"] == "Debian"
    fail_msg: "The mysql role currently supports Debian/Ubuntu only."

- name: Install MySQL server
  ansible.builtin.apt:
    name:
      - mysql-server
      - python3-pymysql
    state: present
    update_cache: true

- name: Ensure MySQL service is enabled and started
  ansible.builtin.service:
    name: mysql
    state: started
    enabled: true

- name: Allow MySQL to listen on the server network
  ansible.builtin.lineinfile:
    path: /etc/mysql/mysql.conf.d/mysqld.cnf
    regexp: '^[# ]*bind-address\s*='
    line: "bind-address = {{ mysql_bind_address }}"
  notify: Restart mysql

- name: Ensure MySQL port is set
  ansible.builtin.lineinfile:
    path: /etc/mysql/mysql.conf.d/mysqld.cnf
    regexp: '^[# ]*port\s*='
    line: "port = {{ mysql_port }}"
  notify: Restart mysql

- name: Check secret env file on MySQL server
  ansible.builtin.stat:
    path: "{{ mysql_secret_env_file }}"
  register: mysql_secret_env_stat

- name: Ensure secret env file exists on MySQL server
  ansible.builtin.assert:
    that:
      - mysql_secret_env_stat.stat.exists
    fail_msg: "Missing secret env file on MySQL server: {{ mysql_secret_env_file }}"

- name: Read database settings from secret env file
  ansible.builtin.shell: |
    set -e
    awk -F= '
      /^DB_DATABASE=/{print "DB_DATABASE=" substr($0, index($0, "=") + 1)}
      /^DB_USERNAME=/{print "DB_USERNAME=" substr($0, index($0, "=") + 1)}
      /^DB_PASSWORD=/{print "DB_PASSWORD=" substr($0, index($0, "=") + 1)}
      /^DB_ROOT_PASSWORD=/{print "DB_ROOT_PASSWORD=" substr($0, index($0, "=") + 1)}
    ' "{{ mysql_secret_env_file }}"
  register: mysql_env_values
  changed_when: false

- name: Resolve database settings
  ansible.builtin.set_fact:
    mysql_app_database: "{{ mysql_env_values.stdout | regex_findall('(?m)^DB_DATABASE=(.*)$') | first | default('') }}"
    mysql_app_username: "{{ mysql_env_values.stdout | regex_findall('(?m)^DB_USERNAME=(.*)$') | first | default('') }}"
    mysql_app_password: "{{ mysql_env_values.stdout | regex_findall('(?m)^DB_PASSWORD=(.*)$') | first | default('') }}"
    mysql_root_password: "{{ mysql_env_values.stdout | regex_findall('(?m)^DB_ROOT_PASSWORD=(.*)$') | first | default('') }}"

- name: Ensure required MySQL env values are present
  ansible.builtin.assert:
    that:
      - mysql_app_database | length > 0
      - mysql_app_username | length > 0
      - mysql_app_password | length > 0 or mysql_app_username == "root"
      - mysql_root_password | length > 0
    fail_msg: "DB_ROOT_PASSWORD, DB_DATABASE, DB_USERNAME and DB_PASSWORD (when DB_USERNAME is not root) must be set in {{ mysql_secret_env_file }}"

- name: Set MySQL root password
  ansible.builtin.shell: |
    set -e
    mysql --protocol=socket -uroot <<'SQL'
    ALTER USER 'root'@'localhost' IDENTIFIED WITH caching_sha2_password BY '{{ mysql_root_password }}';
    ALTER USER IF EXISTS 'root'@'127.0.0.1' IDENTIFIED WITH caching_sha2_password BY '{{ mysql_root_password }}';
    DROP USER IF EXISTS ''@'localhost';
    DROP USER IF EXISTS ''@'%';
    FLUSH PRIVILEGES;
    SQL
  register: mysql_set_root_password
  changed_when: "'ALTER USER' in mysql_set_root_password.stdout or mysql_set_root_password.rc == 0"
  failed_when: false

- name: Set MySQL root password with existing password
  ansible.builtin.shell: |
    set -e
    MYSQL_PWD='{{ mysql_root_password }}' mysql --protocol=socket -uroot <<'SQL'
    ALTER USER 'root'@'localhost' IDENTIFIED WITH caching_sha2_password BY '{{ mysql_root_password }}';
    ALTER USER IF EXISTS 'root'@'127.0.0.1' IDENTIFIED WITH caching_sha2_password BY '{{ mysql_root_password }}';
    DROP USER IF EXISTS ''@'localhost';
    DROP USER IF EXISTS ''@'%';
    FLUSH PRIVILEGES;
    SQL
  when: mysql_set_root_password.rc != 0
  changed_when: false

- name: Ensure application database exists
  ansible.builtin.shell: |
    set -e
    MYSQL_PWD='{{ mysql_root_password }}' mysql --protocol=socket -uroot <<'SQL'
    CREATE DATABASE IF NOT EXISTS `{{ mysql_app_database }}` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    SQL
  changed_when: false

- name: Ensure application MySQL user can connect remotely
  ansible.builtin.shell: |
    set -e
    MYSQL_PWD='{{ mysql_root_password }}' mysql --protocol=socket -uroot <<'SQL'
    CREATE USER IF NOT EXISTS '{{ mysql_app_username }}'@'{{ mysql_allowed_remote_host }}' IDENTIFIED BY '{{ mysql_app_password }}';
    ALTER USER '{{ mysql_app_username }}'@'{{ mysql_allowed_remote_host }}' IDENTIFIED BY '{{ mysql_app_password }}';
    SQL
  when: mysql_app_username != "root"
  changed_when: false

- name: Grant application database privileges to remote MySQL user
  ansible.builtin.shell: |
    set -e
    MYSQL_PWD='{{ mysql_root_password }}' mysql --protocol=socket -uroot <<'SQL'
    GRANT ALL PRIVILEGES ON `{{ mysql_app_database }}`.* TO '{{ mysql_app_username }}'@'{{ mysql_allowed_remote_host }}';
    FLUSH PRIVILEGES;
    SQL
  when: mysql_app_username != "root"
  changed_when: false
