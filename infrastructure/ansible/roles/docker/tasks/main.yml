---
- name: Ensure Debian-based OS
  ansible.builtin.assert:
    that:
      - ansible_facts["os_family"] == "Debian"
    fail_msg: "The docker role currently supports Debian/Ubuntu only."

- name: Install Docker apt prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Resolve Docker apt architecture
  ansible.builtin.set_fact:
    docker_apt_arch: "{{ {'x86_64': 'amd64', 'aarch64': 'arm64'}.get(ansible_facts['architecture'], ansible_facts['architecture']) }}"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_apt_arch }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker service is enabled and started
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add SSH user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

- name: Check app env file on app server
  ansible.builtin.stat:
    path: "{{ app_public_env_file }}"
  register: app_public_env_stat

- name: Read APP_PORT from app env file
  ansible.builtin.command:
    argv:
      - awk
      - -F=
      - '/^APP_PORT=/{print $2; exit}'
      - "{{ app_public_env_file }}"
  register: app_port_lookup
  changed_when: false
  failed_when: false
  when: app_public_env_stat.stat.exists

- name: Resolve app runtime port
  ansible.builtin.set_fact:
    app_runtime_port: "{{ (app_port_lookup.stdout | trim) if (app_port_lookup.stdout | default('') | trim | length > 0) else app_runtime_port_default }}"
