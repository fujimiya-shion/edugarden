x-app-base: &app-base
  image: "${APP_IMAGE:?APP_IMAGE is required}"
  environment: &app-env
    APP_NAME: "${APP_NAME:-EduGarden}"
    APP_ENV: "${APP_ENV:-production}"
    APP_KEY: "${APP_KEY:?APP_KEY is required}"
    APP_DEBUG: "${APP_DEBUG:-false}"
    APP_URL: "${APP_URL:-http://localhost}"
    APP_LOCALE: "${APP_LOCALE:-en}"
    APP_FALLBACK_LOCALE: "${APP_FALLBACK_LOCALE:-en}"
    APP_FAKER_LOCALE: "${APP_FAKER_LOCALE:-en_US}"
    APP_MAINTENANCE_DRIVER: "${APP_MAINTENANCE_DRIVER:-file}"
    BCRYPT_ROUNDS: "${BCRYPT_ROUNDS:-12}"
    LOG_CHANNEL: "${LOG_CHANNEL:-stack}"
    LOG_STACK: "${LOG_STACK:-single}"
    LOG_DEPRECATIONS_CHANNEL: "${LOG_DEPRECATIONS_CHANNEL:-null}"
    LOG_LEVEL: "${LOG_LEVEL:-debug}"
    DB_CONNECTION: "${DB_CONNECTION:-mysql}"
    DB_HOST: "${DB_HOST:-mysql}"
    DB_PORT: "${DB_PORT:-3306}"
    DB_DATABASE: "${DB_DATABASE:?DB_DATABASE is required}"
    DB_USERNAME: "${DB_USERNAME:?DB_USERNAME is required}"
    DB_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
    SESSION_DRIVER: "${SESSION_DRIVER:-database}"
    SESSION_LIFETIME: "${SESSION_LIFETIME:-120}"
    SESSION_ENCRYPT: "${SESSION_ENCRYPT:-false}"
    SESSION_PATH: "${SESSION_PATH:-/}"
    SESSION_DOMAIN: "${SESSION_DOMAIN:-null}"
    BROADCAST_CONNECTION: "${BROADCAST_CONNECTION:-log}"
    FILESYSTEM_DISK: "${FILESYSTEM_DISK:-local}"
    QUEUE_CONNECTION: "${QUEUE_CONNECTION:-database}"
    CACHE_STORE: "${CACHE_STORE:-database}"
    REDIS_CACHE_DB: "${REDIS_CACHE_DB:-0}"
    MEMCACHED_HOST: "${MEMCACHED_HOST:-127.0.0.1}"
    REDIS_CLIENT: "${REDIS_CLIENT:-phpredis}"
    REDIS_HOST: "${REDIS_HOST:-redis}"
    REDIS_PASSWORD: "${REDIS_PASSWORD:-null}"
    REDIS_PORT: "${REDIS_PORT:-6379}"
    MAIL_MAILER: "${MAIL_MAILER:-log}"
    MAIL_SCHEME: "${MAIL_SCHEME:-null}"
    MAIL_HOST: "${MAIL_HOST:-127.0.0.1}"
    MAIL_PORT: "${MAIL_PORT:-2525}"
    MAIL_USERNAME: "${MAIL_USERNAME:-null}"
    MAIL_PASSWORD: "${MAIL_PASSWORD:-null}"
    MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-hello@example.com}"
    MAIL_FROM_NAME: "${MAIL_FROM_NAME:-${APP_NAME:-EduGarden}}"
    AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
    AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
    AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
    AWS_BUCKET: "${AWS_BUCKET:-}"
    AWS_USE_PATH_STYLE_ENDPOINT: "${AWS_USE_PATH_STYLE_ENDPOINT:-false}"
    VITE_APP_NAME: "${VITE_APP_NAME:-${APP_NAME:-EduGarden}}"
    OCTANE_SERVER: "${OCTANE_SERVER:-swoole}"
    APP_HOST: "${APP_HOST:-0.0.0.0}"
    PROVINCE_API_URL: "${PROVINCE_API_URL:-https://provinces.open-api.vn/api/?depth=3}"
    GOOGLE_RECAPTCHA_SITE_KEY: "${GOOGLE_RECAPTCHA_SITE_KEY:-}"
    GOOGLE_RECAPTCHA_SECRET_KEY: "${GOOGLE_RECAPTCHA_SECRET_KEY:-}"
    VIETQR_IMAGE_URL: "${VIETQR_IMAGE_URL:-https://img.vietqr.io/image}"
    VIETQR_IMAGE_TEMPLATE: "${VIETQR_IMAGE_TEMPLATE:-compact2.jpg}"
    VIETQR_BANK_ID: "${VIETQR_BANK_ID:-}"
    VIETQR_ACCOUNT_NO: "${VIETQR_ACCOUNT_NO:-}"
  restart: unless-stopped

services:
  app:
    <<: *app-base
    ports:
      - "${APP_PORT_FORWARD:-80}:${APP_PORT:-8000}"
    environment:
      <<: *app-env
      APP_PORT: "${APP_PORT:-8000}"
      OCTANE_WORKERS: "${OCTANE_WORKERS:-4}"
      OCTANE_TASK_WORKERS: "${OCTANE_TASK_WORKERS:-2}"
      OCTANE_MAX_REQUESTS: "${OCTANE_MAX_REQUESTS:-500}"

  queue:
    <<: *app-base
    command:
      - php
      - artisan
      - queue:work
      - --verbose
      - --tries=${QUEUE_WORKER_TRIES:-3}
      - --sleep=${QUEUE_WORKER_SLEEP:-3}
      - --timeout=${QUEUE_WORKER_TIMEOUT:-90}
      - --max-time=${QUEUE_WORKER_MAX_TIME:-3600}
    stop_signal: SIGTERM
    stop_grace_period: 30s

  scheduler:
    <<: *app-base
    command:
      - php
      - artisan
      - schedule:work
    stop_signal: SIGTERM
    stop_grace_period: 30s
