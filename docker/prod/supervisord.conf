[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:php]
command=/bin/sh -lc 'exec php artisan octane:start --server=swoole --host=0.0.0.0 --port=${APP_PORT:-8000} --workers=${OCTANE_WORKERS:-4} --task-workers=${OCTANE_TASK_WORKERS:-2} --max-requests=${OCTANE_MAX_REQUESTS:-500}'
user=%(ENV_SUPERVISOR_PHP_USER)s
environment=LARAVEL_SAIL="1"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
